name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current version
        id: current
        run: |
          version=$(grep -oP '\.version\s*=\s*"\K[^"]+' build.zig.zon)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Current version: $version"

      - name: Compute new version
        id: bump
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.current.outputs.version }}"
          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          new_version="${major}.${minor}.${patch}"
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"
          echo "tag=v${new_version}" >> "$GITHUB_OUTPUT"
          echo "New version: $new_version"

      - name: Update build.zig.zon
        run: |
          sed -i 's/\.version = ".*"/\.version = "${{ steps.bump.outputs.new_version }}"/' build.zig.zon

      - name: Update protocol.zig (serverInfo version)
        run: |
          sed -i 's/"version":"[0-9]*\.[0-9]*\.[0-9]*"/"version":"${{ steps.bump.outputs.new_version }}"/' src/mcp/protocol.zig

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build.zig.zon src/mcp/protocol.zig
          git commit -m "Bump version to v${{ steps.bump.outputs.new_version }}"
          git push

      - name: Create and push tag
        run: |
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin "v${{ steps.bump.outputs.new_version }}"

  build:
    needs: bump
    strategy:
      matrix:
        include:
          - os: macos-15
            target: aarch64-macos
            artifact: 16bits-audio-mcp-aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-macos
            artifact: 16bits-audio-mcp-x86_64-apple-darwin
          - os: ubuntu-slim
            target: x86_64-linux
            artifact: 16bits-audio-mcp-x86_64-linux
          - os: ubuntu-24.04-arm
            target: aarch64-linux
            artifact: 16bits-audio-mcp-aarch64-linux
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.bump.outputs.new_version }}

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp zig-out/bin/16bits-audio-mcp dist/16bits-audio-mcp
          cd dist && tar czf ${{ matrix.artifact }}.tar.gz 16bits-audio-mcp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz

  release:
    needs: [bump, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.bump.outputs.new_version }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.bump.outputs.new_version }}
          generate_release_notes: true
          files: artifacts/**/*.tar.gz

  update-formula:
    needs: [bump, build, release]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute sha256
        id: sha
        run: |
          echo "aarch64_darwin=$(sha256sum artifacts/16bits-audio-mcp-aarch64-apple-darwin/16bits-audio-mcp-aarch64-apple-darwin.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "x86_64_darwin=$(sha256sum artifacts/16bits-audio-mcp-x86_64-apple-darwin/16bits-audio-mcp-x86_64-apple-darwin.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "x86_64_linux=$(sha256sum artifacts/16bits-audio-mcp-x86_64-linux/16bits-audio-mcp-x86_64-linux.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "aarch64_linux=$(sha256sum artifacts/16bits-audio-mcp-aarch64-linux/16bits-audio-mcp-aarch64-linux.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: Matuyuhi/Matuyuhi-homebrew-tools
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Patch formula
        run: |
          cd homebrew-tap
          ruby -i -pe '
            @sha_count ||= 0
            if $_ =~ /version\s+".*"/
              $_.sub!(/".*"/, "\"${{ needs.bump.outputs.new_version }}\"")
            end
            if $_ =~ /sha256\s+".*"/
              @sha_count += 1
              case @sha_count
              when 1 then $_.sub!(/".*"/, "\"${{ steps.sha.outputs.aarch64_darwin }}\"")
              when 2 then $_.sub!(/".*"/, "\"${{ steps.sha.outputs.x86_64_darwin }}\"")
              when 3 then $_.sub!(/".*"/, "\"${{ steps.sha.outputs.aarch64_linux }}\"")
              when 4 then $_.sub!(/".*"/, "\"${{ steps.sha.outputs.x86_64_linux }}\"")
              end
            end
          ' Formula/16bits-audio-mcp.rb

      - name: Commit and push formula
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/16bits-audio-mcp.rb
          git diff --cached --quiet || git commit -m "Update 16bits-audio-mcp to v${{ needs.bump.outputs.new_version }}"
          git push
